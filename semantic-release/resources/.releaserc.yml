branches:
  - main
  - hotfix/**

tagFormat: "${version}"

preset: "conventionalcommits"

plugins:
  - - "./filter-by-paths.cjs"
    - preset: "conventionalcommits"
  - "semantic-release-commitlint"
  - - "@semantic-release/git"
    - assets: []
      messsage: false
  - - "@semantic-release/github"
    - successComment: false
      failComment: false